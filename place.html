<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas,USA</title>
    <meta name="author" content="Trevor Schwitters">
    <meta name="description" content="page containing info about the state of Texas such as data and weather."> 
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Texas</h1>
    </header>
    <main>
        <picture class="hero">
            <source srcset="images/texas-large.webp" media="(min-width: 600px)">
            <img src="images/texas-small.webp" alt="river with city behind">
        </picture>
        <section class="data">
            <h2>Data</h2>
            <p>Area: 268,597 sq mi</p>
            <p>Population: 32,101,064</p>
            <p>Capital: Austin</p>
            <p>Languages: English, Spanish</p>
            <p>Currency: USD</p>
            <p>Time Zone: UTC-5</p>
            <p>Calling Code: +1</p>
            <p>Internet TLD: .tx</p>
        </section>
        <section class="weather">
            <h2>Weather</h2>
            <img src="images/partly-cloudy.svg" alt="partly cloudy">
            <p>Temperature: <span id="temperature"></span>°F</p>
            <p>Conditions: <span id="conditions"></span></p>
            <p>Wind: <span id="wind"></span>mph</p>
            <p>Wind Chill: <span id="windChill"></span></p>
        </section>
    </main>
    <footer>
         <p>
            ©<span id="currentyear"></span> ✖ Trevor Schwitters ✖ Texas, USA
        </p>
        <p>
            Last Modified: <span id="lastModified"></span>
        </p>
    </footer>
</body>
</html>
